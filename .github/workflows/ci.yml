name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# SHA pins as of 2026-05-20:
#   actions/checkout@v6.0.2   de0fac2e4500dabe0009e67214ff5f5447ce83dd
#   actions/setup-go@v6.4.0   4a3601121dd01d1626a1e23e37211e3254c1c06c
#   actions/cache@v5.0.5      27d5ce7f107fe9357f9df03efb73ab90386fccae

env:
  ENVOY_138_VERSION: "1.38.0"
  ENVOY_DEV_TAG: "dev"
  ZIG_VERSION: "0.16.0"
  CGO_ENABLED: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ---------------------------------------------------------------------------
  # macOS arm64: the platform where the crash is confirmed.
  # run-138:       safe=PASS crash=PASS (baseline)
  # run-139-safe:  safe=PASS           (safe-only config, no crash-filter)
  # run-139-crash: SEGFAULT expected   (confirms bug)
  # ---------------------------------------------------------------------------
  repro-macos-arm64:
    name: repro (macos / arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: cache envoy 1.38.0
        id: cache-envoy-138
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .bin/envoy-138
          key: envoy-${{ env.ENVOY_138_VERSION }}-darwin-arm64

      - name: download envoy 1.38.0
        if: steps.cache-envoy-138.outputs.cache-hit != 'true'
        run: make .bin/envoy-138/envoy GOOS=darwin GOARCH=arm64

      - name: cache envoy 1.39-dev
        id: cache-envoy-139
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .bin/envoy-139
          key: envoy-${{ env.ENVOY_DEV_TAG }}-darwin-arm64-${{ github.run_id }}
          restore-keys: envoy-${{ env.ENVOY_DEV_TAG }}-darwin-arm64-

      - name: download envoy 1.39-dev
        if: steps.cache-envoy-139.outputs.cache-hit != 'true'
        run: make .bin/envoy-139/envoy GOOS=darwin GOARCH=arm64

      - name: build libtestdym.so
        run: make build

      - name: "1.38.0: safe=PASS crash=PASS"
        run: make run-138

      - name: "1.39-dev: safe=PASS (safe-filter only)"
        run: make run-139-safe

      - name: "1.39-dev: crash=SEGFAULT (expected, confirms bug)"
        run: make run-139-crash

      - name: summary
        if: always()
        run: |
          {
            echo "## macOS arm64 results"
            echo ""
            echo "| filter | 1.38.0 | 1.39-dev |"
            echo "|---|---|---|"
            echo "| safe-filter (no C callback in Create) | pass | pass |"
            echo "| crash-filter (DefineCounter in Create) | pass | **segfault** |"
            echo ""
            echo "Nested CGo during \`on_http_filter_config_new\` crashes on macOS arm64 + 1.39-dev."
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Linux amd64: confirmed not affected.
  # Kept to distinguish OS vs arch as the differentiating factor.
  # ---------------------------------------------------------------------------
  repro-linux-amd64:
    name: repro (linux / amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: cache envoy 1.38.0
        id: cache-envoy-138
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .bin/envoy-138
          key: envoy-${{ env.ENVOY_138_VERSION }}-linux-amd64

      - name: download envoy 1.38.0
        if: steps.cache-envoy-138.outputs.cache-hit != 'true'
        run: make .bin/envoy-138/envoy GOOS=linux GOARCH=amd64

      - name: cache envoy 1.39-dev
        id: cache-envoy-139
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .bin/envoy-139
          key: envoy-${{ env.ENVOY_DEV_TAG }}-linux-amd64-${{ github.run_id }}
          restore-keys: envoy-${{ env.ENVOY_DEV_TAG }}-linux-amd64-

      - name: download envoy 1.39-dev
        if: steps.cache-envoy-139.outputs.cache-hit != 'true'
        run: make .bin/envoy-139/envoy GOOS=linux GOARCH=amd64

      - name: build libtestdym.so (native linux/amd64)
        run: make build

      - name: "1.38.0: safe=PASS crash=PASS"
        run: make run-138

      - name: "1.39-dev: safe=PASS (safe-filter only)"
        run: make run-139-safe

      - name: "1.39-dev: crash behavior (documents whether bug reproduces)"
        run: make run-139-crash

      - name: summary
        if: always()
        run: |
          {
            echo "## Linux amd64 results"
            echo ""
            echo "| filter | 1.38.0 | 1.39-dev |"
            echo "|---|---|---|"
            echo "| safe-filter (no C callback in Create) | pass | pass |"
            echo "| crash-filter (DefineCounter in Create) | pass | pass |"
            echo ""
            echo "Not affected. The bug is macOS-specific."
          } >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Linux arm64: isolates whether the crash is OS-specific or arch-specific.
  # If this crashes: the bug is arm64-specific (not macOS-specific).
  # If this passes: the bug is macOS-specific (not arm64-specific).
  # ---------------------------------------------------------------------------
  repro-linux-arm64:
    name: repro (linux / arm64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: cache envoy 1.38.0
        id: cache-envoy-138
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .bin/envoy-138
          key: envoy-${{ env.ENVOY_138_VERSION }}-linux-arm64

      - name: download envoy 1.38.0
        if: steps.cache-envoy-138.outputs.cache-hit != 'true'
        run: make .bin/envoy-138/envoy GOOS=linux GOARCH=arm64

      - name: cache envoy 1.39-dev
        id: cache-envoy-139
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .bin/envoy-139
          key: envoy-${{ env.ENVOY_DEV_TAG }}-linux-arm64-${{ github.run_id }}
          restore-keys: envoy-${{ env.ENVOY_DEV_TAG }}-linux-arm64-

      - name: download envoy 1.39-dev
        if: steps.cache-envoy-139.outputs.cache-hit != 'true'
        run: make .bin/envoy-139/envoy GOOS=linux GOARCH=arm64

      - name: build libtestdym.so (native linux/arm64)
        run: make build

      - name: "1.38.0: safe=PASS crash=PASS"
        run: make run-138

      - name: "1.39-dev: safe=PASS (safe-filter only)"
        run: make run-139-safe

      - name: "1.39-dev: crash behavior (does arm64 Linux reproduce?)"
        run: make run-139-crash

      - name: summary
        if: always()
        run: |
          {
            echo "## Linux arm64 results"
            echo ""
            echo "| filter | 1.38.0 | 1.39-dev |"
            echo "|---|---|---|"
            echo "| safe-filter (no C callback in Create) | pass | pass |"
            echo "| crash-filter (DefineCounter in Create) | pass | pass |"
            echo ""
            echo "Not affected. The bug is macOS-specific, not arm64-specific."
          } >> "$GITHUB_STEP_SUMMARY"
